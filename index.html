<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>NutriTrack</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#34c759"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="NutriTrack"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
body{font-family:-apple-system,system-ui,sans-serif;-webkit-text-size-adjust:100%;}
button{font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
input{font-family:inherit;}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
*{-ms-overflow-style:none;scrollbar-width:none;}
*::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useContext,useCallback,useMemo,createContext}=React;

/* ─── CONSTANTS ───────────────────────────────────────────── */

const KEYS=['kcal','fat','satFat','carbs','sugar','fiber','protein','salt'];
const INFO={
  kcal:   {en:'Calories',  de:'Kalorien',      unit:'kcal',color:'#FF6B6B'},
  fat:    {en:'Fat',       de:'Fett',          unit:'g',   color:'#FF9F43'},
  satFat: {en:'Sat. Fat',  de:'Ges. Fett',     unit:'g',   color:'#FECA57'},
  carbs:  {en:'Carbs',     de:'Kohlenhydrate', unit:'g',   color:'#48DBFB'},
  sugar:  {en:'Sugar',     de:'Zucker',        unit:'g',   color:'#FF9FF3'},
  fiber:  {en:'Fiber',     de:'Ballaststoffe', unit:'g',   color:'#54A0FF'},
  protein:{en:'Protein',   de:'Eiweiß',        unit:'g',   color:'#A29BFE'},
  salt:   {en:'Salt',      de:'Salz',          unit:'g',   color:'#B2BEC3'},
};
const DGOALS={kcal:2000,fat:65,satFat:20,carbs:250,sugar:50,fiber:25,protein:150,salt:6};
const MEALS={en:['Breakfast','Lunch','Dinner','Snacks'],de:['Frühstück','Mittagessen','Abendessen','Snacks']};
const TH={
  light:   {bg:'#f2f2f7',card:'#fff',   text:'#1c1c1e',sub:'#6c6c70',border:'#e5e5ea',accent:'#34c759',alt:'#007aff',danger:'#ff3b30',muted:'#f0f0f5',tab:'#fff',   nm:'Light',   ic:'☀️'},
  dark:    {bg:'#000',   card:'#1c1c1e',text:'#fff',   sub:'#8e8e93',border:'#38383a',accent:'#30d158',alt:'#0a84ff',danger:'#ff453a',muted:'#2c2c2e',tab:'#1c1c1e',nm:'Dark',    ic:'🌙'},
  colorful:{bg:'#0f0a1e',card:'#1e1640',text:'#f0e8ff',sub:'#a78bfa',border:'#2d2060',accent:'#a855f7',alt:'#06b6d4',danger:'#f43f5e',muted:'#160f35',tab:'#120d28',nm:'Colorful',ic:'✦'},
  earthy:  {bg:'#f0ebe0',card:'#faf7f0',text:'#2c1f0e',sub:'#7a5c3d',border:'#d4c8b0',accent:'#8b5e3c',alt:'#5d8c3c',danger:'#c0392b',muted:'#f5f0e5',tab:'#faf7f0',nm:'Earthy',  ic:'🌿'},
};
const DFOODS=[
  {id:'f1',name:'Chicken Breast',  per100:{kcal:165,fat:3.6,satFat:1.0,carbs:0,  sugar:0,  fiber:0,  protein:31, salt:0.07},lastUsed:Date.now()-3e6},
  {id:'f2',name:'Greek Yogurt',    per100:{kcal:59, fat:0.4,satFat:0.1,carbs:3.6,sugar:3.2,fiber:0,  protein:10, salt:0.05},lastUsed:Date.now()-7e6},
  {id:'f3',name:'Rolled Oats',     per100:{kcal:379,fat:6.9,satFat:1.2,carbs:67, sugar:1.1,fiber:10, protein:13, salt:0.01},lastUsed:null},
  {id:'f4',name:'Banana',          per100:{kcal:89, fat:0.3,satFat:0.1,carbs:23, sugar:12, fiber:2.6,protein:1.1,salt:0.01},lastUsed:null},
  {id:'f5',name:'Salmon Fillet',   per100:{kcal:208,fat:13, satFat:3.1,carbs:0,  sugar:0,  fiber:0,  protein:20, salt:0.06},lastUsed:null},
  {id:'f6',name:'Brown Rice',      per100:{kcal:123,fat:0.9,satFat:0.2,carbs:26, sugar:0,  fiber:1.6,protein:2.7,salt:0.01},lastUsed:null},
  {id:'f7',name:'Eggs',            per100:{kcal:155,fat:11, satFat:3.3,carbs:1.1,sugar:1.1,fiber:0,  protein:13, salt:0.37},lastUsed:null},
  {id:'f8',name:'Avocado',         per100:{kcal:160,fat:15, satFat:2.1,carbs:9,  sugar:0.7,fiber:7,  protein:2,  salt:0.01},lastUsed:null},
  {id:'f9',name:'Kidney Beans',    per100:{kcal:99, fat:0.6,satFat:0.1,carbs:13, sugar:0.5,fiber:6,  protein:7.5,salt:0.5}, lastUsed:null},
  {id:'f10',name:'Whole Milk',     per100:{kcal:61, fat:3.3,satFat:1.9,carbs:4.8,sugar:4.8,fiber:0,  protein:3.2,salt:0.04},lastUsed:null},
];

/* ─── UTILS ───────────────────────────────────────────────── */

const LS=(k,fb)=>{try{const v=localStorage.getItem('nt3_'+k);if(!v||v==='null')return fb;return JSON.parse(v)??fb;}catch{return fb;}};
const SS=(k,v)=>{try{localStorage.setItem('nt3_'+k,JSON.stringify(v));}catch{}};
const today=()=>new Date().toISOString().slice(0,10);
const addDays=(s,n)=>{const d=new Date(s+'T12:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
const fmtDate=(s,l)=>new Date(s+'T12:00:00').toLocaleDateString(l==='de'?'de-DE':'en-GB',{weekday:'short',day:'numeric',month:'short'});
const calcNut=(lib,items)=>{
  const t=Object.fromEntries(KEYS.map(k=>[k,0]));
  for(const it of(items||[])){const f=lib.find(f=>f.id===it.foodId);if(!f)continue;const r=it.grams/100;for(const k of KEYS)t[k]+=(f.per100[k]||0)*r;}
  for(const k of KEYS)t[k]=Math.round(t[k]*10)/10;
  return t;
};
const makeMeal=n=>({id:'m'+Date.now()+Math.random().toString(36).slice(2),name:n,items:[],skipped:false});
const makeDayLog=l=>({meals:MEALS[l||'en'].map(n=>makeMeal(n))});
const exportCSV=(lib,logs)=>{
  const rows=[['Date','Meal','Food','Grams',...KEYS]];
  for(const d of Object.keys(logs).sort())for(const m of(logs[d]?.meals||[]))for(const it of m.items){
    const f=lib.find(f=>f.id===it.foodId);if(!f)continue;
    const n=calcNut(lib,[it]);rows.push([d,m.name,f.name,it.grams,...KEYS.map(k=>n[k])]);
  }
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),download:'nutritrack.csv'});
  a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);
};
const streak=(logs,goals,lib)=>{let n=0,d=new Date();while(true){const k=d.toISOString().slice(0,10);const l=logs[k];if(!l||calcNut(lib,l.meals.flatMap(m=>m.items)).kcal<100)break;n++;d.setDate(d.getDate()-1);}return n;};

/* ─── CONTEXT ─────────────────────────────────────────────── */

const Ctx=createContext(null);
const useC=()=>useContext(Ctx);
const useT=()=>{const{settings}=useC();return TH[settings.theme];};

/* ─── PRIMITIVES ──────────────────────────────────────────── */

function Ring({value,goal,label,unit,color,size=68}){
  const r=23,ci=2*Math.PI*r,pct=goal>0?Math.min(1,value/goal):0,ov=goal>0&&value>goal;
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
      <svg width={size} height={size} viewBox="0 0 54 54">
        <circle cx="27" cy="27" r={r} fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="5"/>
        <circle cx="27" cy="27" r={r} fill="none" stroke={ov?'#FF6B6B':color} strokeWidth="5"
          strokeDasharray={ci} strokeDashoffset={ci*(1-pct)} strokeLinecap="round"
          transform="rotate(-90 27 27)" style={{transition:'stroke-dashoffset .5s'}}/>
        <text x="27" y="26" textAnchor="middle" dominantBaseline="central" fill="#fff" fontSize="10" fontWeight="700">{value}</text>
        <text x="27" y="37" textAnchor="middle" dominantBaseline="central" fill="rgba(255,255,255,0.6)" fontSize="6.5">{unit}</text>
      </svg>
      <span style={{fontSize:10,color:'rgba(255,255,255,0.8)',textAlign:'center',maxWidth:60,lineHeight:1.2}}>{label}</span>
    </div>
  );
}

function HBar({label,value,goal,unit,color}){
  const pct=goal>0?Math.min(100,value/goal*100):0,ov=goal>0&&value>goal;
  return(
    <div style={{marginBottom:5}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:2}}>
        <span style={{color:'rgba(255,255,255,0.9)'}}>{label}</span>
        <span style={{color:ov?'#FF6B6B':'rgba(255,255,255,0.7)'}}>{value}{unit}/{goal}{unit}</span>
      </div>
      <div style={{height:4,borderRadius:2,background:'rgba(255,255,255,0.15)',overflow:'hidden'}}>
        <div style={{height:'100%',borderRadius:2,background:ov?'#FF6B6B':color,width:`${pct}%`,transition:'width .4s'}}/>
      </div>
    </div>
  );
}

function ABar({label,value,goal,unit,color}){
  const t=useT(),pct=goal>0?Math.min(100,Math.round(value/goal*100)):0,ov=goal>0&&value>goal;
  return(
    <div style={{marginBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
        <span style={{color:t.text,fontWeight:500}}>{label}</span>
        <span style={{color:ov?t.danger:t.sub}}>{value}{unit}/{goal}{unit}</span>
      </div>
      <div style={{height:7,borderRadius:4,background:t.muted,overflow:'hidden'}}>
        <div style={{height:'100%',borderRadius:4,background:ov?t.danger:color,width:`${pct}%`,transition:'width .4s'}}/>
      </div>
    </div>
  );
}

/* Bottom sheet — position:fixed so it always covers full screen regardless of parent overflow */
function Sheet({onClose,title,children}){
  const t=useT();
  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{
      position:'fixed',inset:0,zIndex:500,background:'rgba(0,0,0,0.6)',
      display:'flex',flexDirection:'column',justifyContent:'flex-end',
      paddingTop:'env(safe-area-inset-top)',
    }}>
      <div style={{
        background:t.card,borderRadius:'22px 22px 0 0',maxHeight:'92%',
        display:'flex',flexDirection:'column',overflow:'hidden',
        paddingBottom:'env(safe-area-inset-bottom)',
      }}>
        <div style={{display:'flex',justifyContent:'center',padding:'10px 0 0',flexShrink:0}}>
          <div style={{width:36,height:4,borderRadius:2,background:t.border}}/>
        </div>
        {title&&(
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 20px 12px',borderBottom:`1px solid ${t.border}`,flexShrink:0}}>
            <span style={{fontSize:17,fontWeight:700,color:t.text}}>{title}</span>
            <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:t.sub,lineHeight:1,padding:'0 4px'}}>✕</button>
          </div>
        )}
        {children}
      </div>
    </div>
  );
}

function GramInput({value,onChange,max=800}){
  const t=useT(),step=d=>onChange(Math.max(0,Math.min(max,(value||0)+d)));
  const btnS={width:40,height:40,borderRadius:20,border:`1.5px solid ${t.border}`,background:t.muted,color:t.text,fontSize:26,cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'};
  return(
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <button onClick={()=>step(-5)} style={btnS}>−</button>
        <div style={{flex:1,position:'relative'}}>
          <input type="number" inputMode="decimal" value={value||''} min={0} max={max}
            onChange={e=>onChange(Math.max(0,Math.min(max,parseFloat(e.target.value)||0)))}
            style={{width:'100%',textAlign:'center',border:`1.5px solid ${t.accent}`,borderRadius:12,padding:'9px 32px 9px 8px',fontSize:22,fontWeight:700,color:t.text,background:t.card,outline:'none',boxSizing:'border-box'}}/>
          <span style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',color:t.sub,fontSize:13,pointerEvents:'none'}}>g</span>
        </div>
        <button onClick={()=>step(5)} style={btnS}>+</button>
      </div>
      <input type="range" min={0} max={max} value={value||0} onChange={e=>onChange(Number(e.target.value))} style={{width:'100%',accentColor:t.accent,cursor:'pointer'}}/>
    </div>
  );
}

function Card({title,children}){
  const t=useT();
  return(
    <div style={{background:t.card,borderRadius:16,padding:14,marginBottom:10,border:`1px solid ${t.border}`}}>
      {title&&<div style={{fontSize:11,fontWeight:700,color:t.sub,marginBottom:10,textTransform:'uppercase',letterSpacing:0.7}}>{title}</div>}
      {children}
    </div>
  );
}

const nbtn=t=>({padding:'6px 12px',borderRadius:8,border:`1px solid ${t.border}`,background:t.muted,color:t.text,fontSize:12,cursor:'pointer'});

/* ─── TODAY ───────────────────────────────────────────────── */

function TodayScreen(){
  const ctx=useC(),t=useT(),l=ctx.settings.lang;
  const [exp,setExp]=useState(null),[addTo,setAddTo]=useState(null);
  const d=ctx.date,isT=d===today();
  const log=ctx.getDayLog(d),meals=log.meals;
  const tot=calcNut(ctx.foods,meals.flatMap(m=>m.items));
  const upd=ms=>ctx.updateDayLog(d,{...log,meals:ms});
  const goD=n=>{ctx.setDate(addDays(d,n));setExp(null);};
  const onAdd=(meal,item)=>{upd(meals.map(m=>m.id!==meal.id?m:{...m,items:[...m.items,item]}));ctx.markUsed(item.foodId);};
  const onDelItem=(mid,i)=>upd(meals.map(m=>{if(m.id!==mid)return m;const it=[...m.items];it.splice(i,1);return{...m,items:it};}));
  const onSkip=mid=>upd(meals.map(m=>m.id===mid?{...m,skipped:!m.skipped}:m));
  const onRen=(mid,nm)=>upd(meals.map(m=>m.id===mid?{...m,name:nm}:m));
  const onAddMeal=()=>{const nm=l==='de'?`Mahlzeit ${meals.length+1}`:`Meal ${meals.length+1}`;upd([...meals,makeMeal(nm)]);};
  const onDelMeal=mid=>{upd(meals.filter(m=>m.id!==mid));if(exp===mid)setExp(null);};
  const macros=[{k:'kcal',c:'#FF6B6B'},{k:'protein',c:'#A29BFE'},{k:'carbs',c:'#48DBFB'},{k:'fat',c:'#FF9F43'}];
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      {/* Fixed gradient header */}
      <div style={{flexShrink:0,background:`linear-gradient(145deg,${t.accent}ee,${t.alt}cc)`,padding:'12px 16px 16px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <button onClick={()=>goD(-1)} style={{background:'rgba(255,255,255,0.2)',border:'none',borderRadius:10,width:34,height:34,color:'#fff',fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
          <div style={{textAlign:'center'}}>
            <div style={{color:'#fff',fontSize:16,fontWeight:700}}>{isT?(l==='de'?'Heute':'Today'):fmtDate(d,l)}</div>
            {isT&&<div style={{color:'rgba(255,255,255,0.75)',fontSize:12}}>{fmtDate(d,l)}</div>}
          </div>
          <button onClick={()=>goD(1)} disabled={isT} style={{background:'rgba(255,255,255,0.2)',border:'none',borderRadius:10,width:34,height:34,color:'#fff',fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',opacity:isT?0.3:1}}>›</button>
        </div>
        <div style={{display:'flex',justifyContent:'space-around',marginBottom:14}}>
          {macros.map(({k,c})=><Ring key={k} value={tot[k]} goal={ctx.goals[k]} label={l==='de'?INFO[k].de:INFO[k].en} unit={INFO[k].unit} color={c} size={68}/>)}
        </div>
        <div style={{background:'rgba(0,0,0,0.18)',borderRadius:12,padding:'10px 12px'}}>
          {['fiber','sugar','satFat','salt'].map(k=><HBar key={k} label={l==='de'?INFO[k].de:INFO[k].en} value={tot[k]} goal={ctx.goals[k]} unit={INFO[k].unit} color={INFO[k].color}/>)}
        </div>
      </div>
      {/* Scrollable meal list — the key layout fix: flex:1 + minHeight:0 */}
      <div style={{flex:1,minHeight:0,overflowY:'auto',WebkitOverflowScrolling:'touch',padding:'10px 12px 24px',background:t.bg}}>
        {meals.map(m=>(
          <MealCard key={m.id} meal={m} expanded={exp===m.id}
            onToggle={()=>setExp(exp===m.id?null:m.id)}
            onAddFood={()=>setAddTo(m)}
            onDelItem={i=>onDelItem(m.id,i)}
            onSkip={()=>onSkip(m.id)}
            onRename={nm=>onRen(m.id,nm)}
            onDelete={()=>onDelMeal(m.id)}
            canDelete={meals.length>1}/>
        ))}
        <button onClick={onAddMeal} style={{width:'100%',padding:12,borderRadius:14,border:`1.5px dashed ${t.border}`,background:'none',color:t.sub,fontSize:14,cursor:'pointer',marginTop:4}}>
          + {l==='de'?'Mahlzeit hinzufügen':'Add Meal'}
        </button>
      </div>
      {addTo&&<AddFoodSheet meal={addTo} onClose={()=>setAddTo(null)} onAdd={it=>{onAdd(addTo,it);setAddTo(null);}}/>}
    </div>
  );
}

function MealCard({meal,expanded,onToggle,onAddFood,onDelItem,onSkip,onRename,onDelete,canDelete}){
  const {foods,settings}=useC(),t=useT(),l=settings.lang;
  const [editing,setEditing]=useState(false),[nv,setNv]=useState(meal.name);
  const nut=calcNut(foods,meal.items),cnt=meal.items.length;
  const save=()=>{if(nv.trim())onRename(nv.trim());setEditing(false);};
  return(
    <div style={{background:t.card,borderRadius:16,marginBottom:8,border:`1px solid ${t.border}`,opacity:meal.skipped?0.55:1,overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',padding:'12px 14px',gap:8}} onClick={!editing?onToggle:undefined}>
        <div style={{flex:1,minWidth:0}}>
          {editing?(
            <input value={nv} autoFocus onChange={e=>setNv(e.target.value)} onBlur={save}
              onKeyDown={e=>e.key==='Enter'&&save()} onClick={e=>e.stopPropagation()}
              style={{fontSize:15,fontWeight:600,color:t.text,background:'none',border:`1px solid ${t.accent}`,borderRadius:6,padding:'2px 8px',outline:'none',width:'100%'}}/>
          ):(
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <span style={{fontSize:15,fontWeight:600,color:t.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{meal.name}</span>
              <button onClick={e=>{e.stopPropagation();setEditing(true);}} style={{background:'none',border:'none',color:t.sub,cursor:'pointer',fontSize:13,padding:0,opacity:0.6,flexShrink:0}}>✎</button>
            </div>
          )}
          <div style={{fontSize:12,color:t.sub,marginTop:2}}>
            {meal.skipped?(l==='de'?'Übersprungen':'Skipped'):cnt===0?(l==='de'?'Leer':'Empty'):`${cnt} item${cnt!==1?'s':''} · ${nut.kcal} kcal`}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
          {nut.kcal>0&&<span style={{fontSize:14,fontWeight:700,color:t.accent}}>{nut.kcal} kcal</span>}
          <span style={{color:t.sub,fontSize:20,display:'inline-block',transform:expanded?'rotate(180deg)':'none',transition:'transform .2s'}}>⌄</span>
        </div>
      </div>
      {expanded&&(
        <div style={{borderTop:`1px solid ${t.border}`}}>
          {meal.items.map((it,i)=>{
            const f=foods.find(f=>f.id===it.foodId);if(!f)return null;
            const n=calcNut(foods,[it]);
            return(
              <div key={i} style={{display:'flex',alignItems:'center',padding:'10px 14px',borderBottom:`1px solid ${t.border}`,gap:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:500,color:t.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</div>
                  <div style={{fontSize:11,color:t.sub}}>{it.grams}g · {n.kcal} kcal · {n.protein}g P · {n.carbs}g C · {n.fat}g F</div>
                </div>
                <button onClick={()=>onDelItem(i)} style={{background:'none',border:'none',color:t.danger,fontSize:22,cursor:'pointer',padding:'0 4px',flexShrink:0,lineHeight:1}}>⊗</button>
              </div>
            );
          })}
          <div style={{display:'flex',gap:8,padding:'10px 14px'}}>
            {!meal.skipped&&<button onClick={onAddFood} style={{flex:1,padding:9,borderRadius:10,background:t.accent,border:'none',color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>+ {l==='de'?'Hinzufügen':'Add Food'}</button>}
            <button onClick={onSkip} style={{padding:'9px 12px',borderRadius:10,background:t.muted,border:`1px solid ${t.border}`,color:t.sub,fontSize:12,cursor:'pointer'}}>
              {meal.skipped?(l==='de'?'Aufheben':'Unskip'):(l==='de'?'Skip':'Skip')}
            </button>

function DayView(){

  return(
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
        <button onClick={()=>setD(addDays(d,-1))} style={nbtn(t)}>‹</button>
        <span style={{fontSize:14,fontWeight:600,color:t.text}}>{isT?(l==='de'?'Heute':'Today'):fmtDate(d,l)}</span>
        <button onClick={()=>setD(addDays(d,1))} disabled={isT} style={{...nbtn(t),opacity:isT?0.3:1}}>›</button>
      </div>
      <Card title={l==='de'?'Nährstoffe vs. Ziel':'Nutrients vs Goal'}>
        {KEYS.map(k=><ABar key={k} label={l==='de'?INFO[k].de:INFO[k].en} value={tot[k]} goal={ctx.goals[k]} unit={INFO[k].unit} color={INFO[k].color}/>)}
      </Card>

            <div key={i} style={{marginBottom:8}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
                <span style={{color:t.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'65%'}}>{m.name}</span>
                <span style={{color:t.sub,fontWeight:600}}>{m.kcal} kcal</span>
              </div>
              <div style={{height:6,borderRadius:3,background:t.muted,overflow:'hidden'}}>
                <div style={{height:'100%',borderRadius:3,background:t.alt,width:`${(m.kcal/maxMK)*100}%`}}/>
              </div>
            </div>
          ))}
        </Card>
      )}
      {macKcal>0&&(

        </Card>
      )}

function MacroPie({protein,carbs,fat,lang}){
  const t=useT();
  const tot=protein*4+carbs*4+fat*9;
  if(tot===0)return<div style={{textAlign:'center',color:t.sub,padding:'20px',fontSize:13}}>No data logged today</div>;
  const pP=Math.round(protein*4/tot*100),cP=Math.round(carbs*4/tot*100),fP=100-pP-cP;
  const r=46,ci=2*Math.PI*r;let off=0;
  const segs=[{pct:cP,color:'#48DBFB',label:lang==='de'?'Kohlenhy.':'Carbs'},{pct:pP,color:'#A29BFE',label:lang==='de'?'Eiweiß':'Protein'},{pct:fP,color:'#FF9F43',label:lang==='de'?'Fett':'Fat'}];
  return(
    <div style={{display:'flex',alignItems:'center',gap:16}}>
      <svg width="108" height="108" viewBox="0 0 112 112">
        {segs.map((s,i)=>{const len=ci*(s.pct/100);const el=<circle key={i} cx="56" cy="56" r={r} fill="none" stroke={s.color} strokeWidth="16" strokeDasharray={`${len} ${ci-len}`} strokeDashoffset={-off} transform="rotate(-90 56 56)" opacity=".9"/>;off+=len;return el;})}
        <circle cx="56" cy="56" r="31" fill={t.card}/>
        <text x="56" y="56" textAnchor="middle" dominantBaseline="central" fontSize="11" fill={t.text} fontWeight="700">{Math.round(tot/4)} kcal</text>
      </svg>
      <div style={{flex:1}}>
        {segs.map((s,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:6,marginBottom:7}}>
            <div style={{width:10,height:10,borderRadius:5,background:s.color,flexShrink:0}}/>
            <span style={{fontSize:13,color:t.text,flex:1}}>{s.label}</span>
            <span style={{fontSize:13,fontWeight:600,color:t.sub}}>{s.pct}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function WeekView(){

  const [ws,setWs]=useState(()=>{const d=new Date();d.setDate(d.getDate()-6);return d.toISOString().slice(0,10);});
  const days=useMemo(()=>[...Array(7)].map((_,i)=>addDays(ws,i)),[ws]);
  const data=days.map(d=>{const it=ctx.getDayLog(d).meals.flatMap(m=>m.items);return{date:d,kcal:calcNut(ctx.foods,it).kcal};});
  const maxK=Math.max(...data.map(d=>d.kcal),ctx.goals.kcal,1);

    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <button onClick={()=>setWs(addDays(ws,-7))} style={nbtn(t)}>‹ {l==='de'?'Vor.':'Prev'}</button>
        <span style={{fontSize:12,color:t.sub}}>{fmtDate(days[0],l)} – {fmtDate(days[6],l)}</span>

          {data.map((d,i)=>{const bw=28,gap=12,x=i*(bw+gap)+6,bh=Math.max(1,(d.kcal/maxK)*90),y=90-bh,isT=d.date===today();
            return(<g key={i}>
              <rect x={x} y={y} width={bw} height={bh} rx="4" fill={isT?t.accent:t.alt} opacity={d.kcal===0?.18:.85}/>
              {d.kcal>0&&<text x={x+bw/2} y={y-4} textAnchor="middle" fontSize="7" fill={t.sub}>{d.kcal}</text>}

          const tot=data.reduce((s,d)=>s+calcNut(ctx.foods,ctx.getDayLog(d.date).meals.flatMap(m=>m.items))[k],0);
          const avg=Math.round(tot/7*10)/10;

              <span style={{fontSize:14,color:t.text}}>{l==='de'?INFO[k].de:INFO[k].en}</span>
              <span style={{fontSize:14,color:t.sub}}>Σ <strong style={{color:t.text}}>{Math.round(tot*10)/10}</strong> · avg <span style={{color:c}}>{avg}</span>{INFO[k].unit}</span>
            </div>
          );
        })}
      </Card>
    </div>
  );
}

function MonthView(){
  const ctx=useC(),t=useT(),l=ctx.settings.lang;
  const [mo,setMo]=useState(()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;});
  const [yr,m]=mo.split('-').map(Number);
  const dim=new Date(yr,m,0).getDate(),fd=(new Date(yr,m-1,1).getDay()+6)%7;
  const cells=[...Array(fd).fill(null),...Array(dim).fill(0).map((_,i)=>`${mo}-${String(i+1).padStart(2,'0')}`)];
  const gc=d=>{if(!d)return'transparent';const k=calcNut(ctx.foods,ctx.getDayLog(d).meals.flatMap(m=>m.items)).kcal;if(!k)return t.muted;const p=k/ctx.goals.kcal;if(p<.5)return'#54A0FF44';if(p<.9)return'#48DBFB88';if(p<=1.1)return t.accent+'99';return'#FF6B6B88';};
  const pM=()=>{const d=new Date(yr,m-2,1);setMo(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);};
  const nM=()=>{const d=new Date(yr,m,1);setMo(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);};
  const wd=l==='de'?['Mo','Di','Mi','Do','Fr','Sa','So']:['Mo','Tu','We','Th','Fr','Sa','Su'];
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <button onClick={pM} style={nbtn(t)}>‹</button>
        <span style={{fontSize:15,fontWeight:600,color:t.text}}>{new Date(yr,m-1,1).toLocaleDateString(l==='de'?'de-DE':'en-GB',{month:'long',year:'numeric'})}</span>
        <button onClick={nM} style={nbtn(t)}>›</button>
      </div>
      <Card>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,marginBottom:4}}>
          {wd.map(d=><div key={d} style={{textAlign:'center',fontSize:10,color:t.sub,fontWeight:600}}>{d}</div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
          {cells.map((d,i)=>{
            if(!d)return<div key={i}/>;
            const day=parseInt(d.split('-')[2]),isT=d===today(),k=calcNut(ctx.foods,ctx.getDayLog(d).meals.flatMap(m=>m.items)).kcal;
            return(
              <div key={d} style={{aspectRatio:'1',borderRadius:7,background:gc(d),display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',border:isT?`2px solid ${t.accent}`:'2px solid transparent'}}>
                <span style={{fontSize:11,fontWeight:isT?700:400,color:t.text}}>{day}</span>
                {k>0&&<span style={{fontSize:7,color:t.sub}}>{k}</span>}
              </div>
            );
          })}
        </div>
        <div style={{display:'flex',gap:10,marginTop:12,flexWrap:'wrap'}}>
          {[['#54A0FF44','<50%'],['#48DBFB88','50-90%'],[t.accent+'99','90-110%'],['#FF6B6B88','>110%']].map(([c,lb])=>(
            <div key={lb} style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:t.sub}}>
              <div style={{width:10,height:10,borderRadius:3,background:c}}/>{lb}
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

/* ─── SETTINGS ────────────────────────────────────────────── */

function SettingsScreen(){
  const ctx=useC(),t=useT(),l=ctx.settings.lang;
  const [gd,setGd]=useState({...ctx.goals}),[saved,setSaved]=useState(false);
  const sk=streak(ctx.logs,ctx.goals,ctx.foods);
  const saveG=()=>{ctx.setGoals(gd);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{flexShrink:0,background:t.card,borderBottom:`1px solid ${t.border}`,padding:'14px 16px 10px'}}>
        <span style={{fontSize:20,fontWeight:700,color:t.text}}>{l==='de'?'Einstellungen':'Settings'}</span>
      </div>
      <div style={{flex:1,minHeight:0,overflowY:'auto',WebkitOverflowScrolling:'touch',padding:'12px 12px 30px',background:t.bg}}>
        <div style={{background:`linear-gradient(135deg,${t.accent},${t.alt})`,borderRadius:16,padding:16,marginBottom:10,display:'flex',alignItems:'center',gap:14}}>
          <div style={{fontSize:44}}>🔥</div>
          <div>
            <div style={{fontSize:30,fontWeight:800,color:'#fff'}}>{sk} {l==='de'?'Tag':'Day'}{sk!==1?'s':''}</div>
            <div style={{fontSize:13,color:'rgba(255,255,255,0.8)'}}>{l==='de'?'Aktuelle Serie':'Current streak'}</div>
          </div>
        </div>
        <Card title={l==='de'?'Design':'Theme'}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {Object.entries(TH).map(([k,th])=>(
              <button key={k} onClick={()=>ctx.setSettings(s=>({...s,theme:k}))} style={{padding:12,borderRadius:12,cursor:'pointer',textAlign:'left',position:'relative',border:`2px solid ${ctx.settings.theme===k?th.accent:t.border}`,background:th.bg}}>
                <div style={{fontSize:20,marginBottom:4}}>{th.ic}</div>
                <div style={{fontSize:13,fontWeight:600,color:th.text}}>{th.nm}</div>
                <div style={{display:'flex',gap:4,marginTop:5}}>{[th.accent,th.alt,th.card].map((c,i)=><div key={i} style={{width:10,height:10,borderRadius:5,background:c}}/>)}</div>
                {ctx.settings.theme===k&&<div style={{position:'absolute',top:8,right:8,width:18,height:18,borderRadius:9,background:th.accent,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:'#fff',fontWeight:700}}>✓</div>}
              </button>
            ))}
          </div>
        </Card>
        <Card title={l==='de'?'Sprache':'Language'}>
          <div style={{display:'flex',background:t.muted,borderRadius:10,padding:3}}>
            {[['en','🇬🇧 English'],['de','🇩🇪 Deutsch']].map(([k,lb])=>(
              <button key={k} onClick={()=>ctx.setSettings(s=>({...s,lang:k}))} style={{flex:1,padding:9,borderRadius:8,border:'none',fontSize:14,fontWeight:600,cursor:'pointer',background:ctx.settings.lang===k?t.card:'none',color:ctx.settings.lang===k?t.text:t.sub,boxShadow:ctx.settings.lang===k?'0 1px 4px rgba(0,0,0,0.1)':'none'}}>{lb}</button>
            ))}
          </div>
        </Card>
        <Card title={l==='de'?'Tägliche Ziele':'Daily Goals'}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
            {KEYS.map(k=>(
              <label key={k} style={{display:'flex',flexDirection:'column',gap:4}}>
                <span style={{fontSize:11,color:t.sub,display:'flex',alignItems:'center',gap:4}}>
                  <span style={{width:8,height:8,borderRadius:4,background:INFO[k].color,display:'inline-block'}}/>
                  {l==='de'?INFO[k].de:INFO[k].en} ({INFO[k].unit})
                </span>
                <input type="number" inputMode="decimal" value={gd[k]} min={0} onChange={e=>setGd(g=>({...g,[k]:parseFloat(e.target.value)||0}))}
                  style={{padding:'8px 10px',borderRadius:8,border:`1px solid ${t.border}`,background:t.muted,color:t.text,fontSize:15,outline:'none',boxSizing:'border-box'}}/>
              </label>
            ))}
          </div>
          <button onClick={saveG} style={{width:'100%',padding:12,borderRadius:12,border:'none',color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer',transition:'background .3s',background:saved?t.accent:t.alt}}>
            {saved?(l==='de'?'✓ Gespeichert!':'✓ Saved!'):(l==='de'?'Ziele speichern':'Save Goals')}
          </button>
        </Card>
        <Card title={l==='de'?'Daten':'Data'}>
          <button onClick={()=>exportCSV(ctx.foods,ctx.logs)} style={{width:'100%',padding:13,borderRadius:12,background:t.muted,border:`1px solid ${t.border}`,color:t.text,fontSize:15,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            📥 {l==='de'?'Als CSV exportieren':'Export as CSV'}
          </button>
          <div style={{marginTop:8,fontSize:11,color:t.sub,textAlign:'center'}}>{Object.keys(ctx.logs).length} {l==='de'?'Tage':'days'} · {ctx.foods.length} {l==='de'?'Lebensmittel':'foods'}</div>
          <button onClick={()=>{if(window.confirm(l==='de'?'Alle Daten löschen?':'Reset all data?')){SS('foods',DFOODS);SS('logs',{});window.location.reload();}}}
            style={{width:'100%',marginTop:10,padding:11,borderRadius:12,background:'none',border:`1px solid ${t.danger}`,color:t.danger,fontSize:13,cursor:'pointer'}}>
            {l==='de'?'Alle Daten zurücksetzen':'Reset All Data'}
          </button>
        </Card>
        <div style={{textAlign:'center',padding:'10px 0',color:t.sub,fontSize:11}}>NutriTrack v3.0 · PWA</div>
      </div>
    </div>
  );
}

/* ─── TAB ICONS ───────────────────────────────────────────── */

function TI({k,active,accent,sub}){
  const c=active?'#fff':sub;
  if(k==='today')return(<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="13" rx="2.5" stroke={c} strokeWidth="1.5"/><line x1="1" y1="6" x2="15" y2="6" stroke={c} strokeWidth="1.2"/><line x1="5" y1="1" x2="5" y2="4" stroke={c} strokeWidth="1.5" strokeLinecap="round"/><line x1="11" y1="1" x2="11" y2="4" stroke={c} strokeWidth="1.5" strokeLinecap="round"/><circle cx="8" cy="10.5" r="1.5" fill={c}/></svg>);
  if(k==='library')return(<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="2" width="4" height="12" rx="1" stroke={c} strokeWidth="1.3"/><rect x="7" y="4" width="7.5" height="10" rx="1" stroke={c} strokeWidth="1.3"/><line x1="7" y1="7.5" x2="14.5" y2="7.5" stroke={c} strokeWidth="1"/><line x1="7" y1="10" x2="14.5" y2="10" stroke={c} strokeWidth="1"/></svg>);
  if(k==='analytics')return(<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><polyline points="1,13 5,8 8,10 11,5 15,3" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/><circle cx="15" cy="3" r="1.5" fill={c}/></svg>);
  return(<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.5" stroke={c} strokeWidth="1.3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M3.1 12.9l1.4-1.4M11.5 4.5l1.4-1.4" stroke={c} strokeWidth="1.3" strokeLinecap="round"/></svg>);
}

/* ─── ROOT APP ────────────────────────────────────────────── */

function App(){
  const [foods,setFoods]=useState(()=>LS('foods',DFOODS));
  const [logs, setLogs] =useState(()=>LS('logs',{}));
  const [goals,setGoals]=useState(()=>LS('goals',DGOALS));
  const [settings,setSettings]=useState(()=>LS('settings',{theme:'light',lang:'en'}));
  const [tab,setTab]=useState('today');
  const [date,setDate]=useState(today);

  // Auto-advance when midnight rolls over.
  // Only moves forward if the user is currently on "today" — past dates stay unchanged.
  useEffect(()=>{
    const tick=()=>{const t=today();setDate(prev=>prev<t?t:prev);};
    const id=setInterval(tick,30000);
    return()=>clearInterval(id);
  },[]);

  useEffect(()=>{SS('foods',foods);},[foods]);
  useEffect(()=>{SS('logs',logs);},[logs]);
  useEffect(()=>{SS('goals',goals);},[goals]);
  useEffect(()=>{SS('settings',settings);},[settings]);

  const getDayLog=useCallback(d=>logs[d]||makeDayLog(settings.lang),[logs,settings.lang]);
  const updateDayLog=useCallback((d,log)=>setLogs(p=>({...p,[d]:log})),[]);
  const markUsed=useCallback(fid=>setFoods(fs=>fs.map(f=>f.id===fid?{...f,lastUsed:Date.now()}:f)),[]);

  const t=TH[settings.theme],l=settings.lang;
  const ctx={foods,setFoods,logs,setLogs,goals,setGoals,settings,setSettings,date,setDate,getDayLog,updateDayLog,markUsed};
  const tabs=[{k:'today',en:'Today',de:'Heute'},{k:'library',en:'Library',de:'Lebensmittel'},{k:'analytics',en:'Analytics',de:'Analyse'},{k:'settings',en:'Settings',de:'Einst.'}];

  return(
    <Ctx.Provider value={ctx}>
      {/*
        THE LAYOUT:
        position:fixed + inset:0 → fills exact viewport on all iOS Safari versions.
        No height:100% chains to worry about. Tab bar is always visible.
        Each screen: flex column, header shrinks, scroll area flex:1+minHeight:0.
      */}
      <div style={{
        position:'fixed',inset:0,
        display:'flex',flexDirection:'column',
        background:t.bg,
        paddingTop:'env(safe-area-inset-top)',
        paddingBottom:'env(safe-area-inset-bottom)',
        fontFamily:'-apple-system,system-ui,sans-serif',
        WebkitFontSmoothing:'antialiased',
      }}>
        {/* Screen — flex:1 + minHeight:0 is the critical pair */}
        <div style={{flex:1,minHeight:0,position:'relative',overflow:'hidden'}}>
          {tab==='today'    &&<TodayScreen/>}
          {tab==='library'  &&<LibraryScreen/>}
          {tab==='analytics'&&<AnalyticsScreen/>}
          {tab==='settings' &&<SettingsScreen/>}
        </div>

        {/* Tab bar — flexShrink:0 keeps it anchored at bottom always */}
        <div style={{flexShrink:0,background:t.tab,borderTop:`1px solid ${t.border}`,display:'flex',paddingTop:6,paddingBottom:2}}>
          {tabs.map(({k,en,de})=>{
            const a=tab===k;
            return(
              <button key={k} onClick={()=>setTab(k)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'4px 0 6px',background:'none',border:'none',cursor:'pointer',WebkitTapHighlightColor:'transparent'}}>
                <div style={{width:28,height:28,borderRadius:8,background:a?t.accent:'none',display:'flex',alignItems:'center',justifyContent:'center',transition:'background .18s'}}>
                  <TI k={k} active={a} accent={t.accent} sub={t.sub}/>
                </div>
                <span style={{fontSize:10,color:a?t.accent:t.sub,fontWeight:a?700:400,transition:'color .18s'}}>{l==='de'?de:en}</span>
              </button>
            );
          })}
        </div>
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
